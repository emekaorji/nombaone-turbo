name: nombaone-api-sandbox
region: fra

services:
  - name: api
    github:
      repo: emekaorji/nombaone
      branch: main
      deploy_on_push: false

    source_dir: /
    dockerfile_path: apps/api/Dockerfile

    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

    health_check:
      http_path: /v1/health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3

    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
